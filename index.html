   <script>
       window.fetchMatches = async function() {
    console.log("Sorğu göndərilir...");
    
    const API_KEY = '100dddf0da034503890c0624dc38776d';
    // Proxy URL CORS-u aşmaq üçün şərtdir
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent('https://api.football-data.org/v4/competitions/WC/matches');

    try {
        const response = await fetch(proxyUrl, {
            headers: { 'X-Auth-Token': API_KEY }
        });

        if (!response.ok) throw new Error("API xətası: " + response.status);

        const data = await response.json();
        matchesData = data.matches;

        // 1. Tarixlər bölməsi
        document.getElementById('schedule-container').innerHTML = matchesData.filter(m => m.status === 'SCHEDULED' || m.status === 'TIMED').map(m => `
            <div class="match-card">
                <strong>${m.homeTeam.name} vs ${m.awayTeam.name}</strong><br>
                <small style="color:#666">📅 ${new Date(m.utcDate).toLocaleDateString()} ⏰ ${new Date(m.utcDate).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</small>
            </div>`).join('') || "Oyun yoxdur.";

        // 2. Canlı oyunlar bölməsi
        document.getElementById('live-container').innerHTML = matchesData.filter(m => 
            m.status === 'IN_PLAY' || m.status === 'PAUSED' || m.status === 'HALFTIME'
        ).map(m => {
            const homeScore = (m.score.current && m.score.current.home !== null) ? m.score.current.home : (m.score.fullTime.home ?? 0);
            const awayScore = (m.score.current && m.score.current.away !== null) ? m.score.current.away : (m.score.fullTime.away ?? 0);
            return `
            <div class="match-card">
                <strong>${m.homeTeam.name} vs ${m.awayTeam.name}</strong><br>
                <div style="font-size: 1.5em; font-weight: bold; color: #e74c3c; margin: 10px 0;">${homeScore} : ${awayScore}</div>
                <small>Status: ${m.status}</small>
            </div>`;
        }).join('') || "Hazırda canlı oyun yoxdur.";

        // 3. Bitmiş oyunlar bölməsi
        document.getElementById('finished-container').innerHTML = matchesData.filter(m => m.status === 'FINISHED').map(m => 
            `<div class="match-card">${m.homeTeam.name} ${m.score.fullTime.home}:${m.score.fullTime.away} ${m.awayTeam.name}</div>`
        ).join('') || "Oyun yoxdur.";
        
        // 4. Proqnoz tabı bölməsi
        document.getElementById('tab2-container').innerHTML = matchesData.slice(0, 20).map((m, i) => {
            const saved = localStorage.getItem('s-' + currentUser + '-' + i);
            const isDisabled = saved ? 'disabled' : '';
            return `<div class="match-card">${m.homeTeam.name} vs ${m.awayTeam.name} <br>
                <input type="number" id="h-${i}" value="${saved ? saved.split(' - ')[0] : ''}" ${isDisabled}>
                <input type="number" id="a-${i}" value="${saved ? saved.split(' - ')[1] : ''}" ${isDisabled}>
                <button onclick="saveScore(${i}, event)" class="main-btn" style="background:${saved ? '#ccc':'var(--accent)'}; color:white" ${isDisabled}>${saved ? 'Yadda saxlanıldı' : 'Yadda saxla'}</button></div>`;
        }).join('');
        
        // Məlumatlar yükləndikdən sonra köməkçi funksiyaları çağır
        updatePointsTable(); 
        updateNotifications();
        checkAndRefreshStatus();
        
        console.log("Sistem tam uyğunlaşdırıldı və UI yeniləndi.");

    } catch (e) {
        console.error("Xəta baş verdi:", e);
    }
}; 

       </script>

    }

 function saveScore(i) {
    const m = matchesData[i];
    const hInput = document.getElementById(`h-${i}`);
    const aInput = document.getElementById(`a-${i}`);
    const btn = document.querySelector(`button[onclick="saveScore(${i})"]`);
    
    const h = parseInt(hInput.value);
    const a = parseInt(aInput.value);
    
    if (!isNaN(h) && !isNaN(a)) {
        let pts = parseInt(localStorage.getItem('pts_' + currentUser) || 0);
        let msgText = "";
        const matchName = `${m.homeTeam.name} - ${m.awayTeam.name}`;

        if (m.status === 'FINISHED') {
            const realH = m.score.fullTime.home;
            const realA = m.score.fullTime.away;
            
            if (h === realH && a === realA) {
                pts += 4;
                msgText = `${matchName} (${realH}:${realA}) - Dəqiq hesab! 4 xal qazandınız.`;
            } else if ((realH !== realA) && (h !== a) && ((h - a) === (realH - realA))) {
                pts += 2;
                msgText = `${matchName} (${realH}:${realA}) - Qol fərqi düzdür! 2 xal qazandınız.`;
            } else if (realH === realA && h === a) {
                pts += 1;
                msgText = `${matchName} (${realH}:${realA}) - Bərabərlik düz tapıldı! 1 xal qazandınız.`;
            } else if ((realH > realA && h > a) || (realA > realH && a > h)) {
                pts += 1;
                msgText = `${matchName} (${realH}:${realA}) - Qalibi düzgün tapdınız! 1 xal qazandınız.`;
            } else {
                msgText = `${matchName} (${realH}:${realA}) - Proqnozunuz (${h}:${a}) düzgün çıxmadı.`;
            }
            localStorage.setItem('pts_' + currentUser, pts);
        } else {
            msgText = `${matchName}: Proqnozunuz (${h}:${a}) qeydə alındı, oyunun bitməsi gözlənilir.`;
        }

        // Bildirişi obyekt kimi saxlayırıq (JSON)
        const notification = { text: msgText, time: Date.now() };
        localStorage.setItem('s-' + currentUser + '-' + i, `${h} - ${a}`);
        localStorage.setItem('msg_' + currentUser + '_' + i, JSON.stringify(notification));
        
        hInput.disabled = true; aInput.disabled = true;
        btn.disabled = true; btn.innerText = "Yadda saxlanıldı";
        btn.style.backgroundColor = "#bdc3c7";

        updatePointsTable(); 
        updateNotifications();
    } else {
        alert("Zəhmət olmasa xanaları doldurun!");
    }
}

function updateNotifications() {
    let container = document.getElementById('notification-container');
    if (!container) return;
    
    let messages = [];
    
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            try {
                let data = JSON.parse(localStorage.getItem(key));
                messages.push(data);
            } catch (e) {
                // Köhnə məlumatları təmizləmək və ya emal etmək üçün
                console.log("Köhnə formatlı məlumat aşkar edildi.");
            }
        }
    }

    // Ən son bildirişi ən başa çəkirik
    messages.sort((a, b) => b.time - a.time);
    
    let html = messages.map(msgData => {
        let dateStr = new Date(msgData.time).toLocaleString('az-AZ');
        let text = msgData.text;
        
        let colorClass = "msg-loading";
        if (text.includes("4 xal")) colorClass = "msg-4";
        else if (text.includes("2 xal")) colorClass = "msg-2";
        else if (text.includes("1 xal")) colorClass = "msg-1";
        else if (text.includes("düzgün çıxmadı")) colorClass = "msg-0";
        
        return `<div class="match-card ${colorClass}">
                    <div style="font-size: 11px; color: #777; margin-bottom: 5px;">${dateStr}</div>
                    ${text}
                </div>`;
    }).join('');

    container.innerHTML = html || "<p>Hələlik bildiriş yoxdur.</p>";
}


    
    function updatePointsTable() {
        let users = [];
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.startsWith('pts_')) users.push({ name: key.replace('pts_', ''), pts: parseInt(localStorage.getItem(key)) });
        }
        users.sort((a, b) => b.pts - a.pts);
        document.getElementById('table-body').innerHTML = users.map((u, i) => `<tr><td>${i+1}</td><td>${u.name}</td><td>${u.pts}</td></tr>`).join('');
    }

    function showMain(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function showSub(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function hardReset() {
    // 1. Bütün məlumatları təmizləyir
    localStorage.clear();
    
    // 2. İstifadəçiyə məlumat verir
    alert("Sistem tamamilə təmizləndi! Səhifə yenilənir.");
    
    // 3. Səhifəni kəşf yaddaşını təmizləyərək yenidən yükləyir
    window.location.reload(true);
}
    function calculateAndNotify(m, i) {
    const saved = localStorage.getItem('s-' + currentUser + '-' + i);
    if (!saved) return;

    const [h, a] = saved.split(' - ').map(Number);
    const realH = m.score.fullTime.home;
    const realA = m.score.fullTime.away;
    
    let pts = parseInt(localStorage.getItem('pts_' + currentUser) || 0);
    let msgText = "";
    const matchName = `${m.homeTeam.name} - ${m.awayTeam.name}`;

    // Xal hesablama məntiqi (saveScore ilə eyni)
    if (h === realH && a === realA) {
        pts += 4;
        msgText = `${matchName} (${realH}:${realA}) - Dəqiq hesab! 4 xal qazandınız.`;
    } else if ((realH !== realA) && (h !== a) && ((h - a) === (realH - realA))) {
        pts += 2;
        msgText = `${matchName} (${realH}:${realA}) - Qol fərqi düzdür! 2 xal qazandınız.`;
    } else if (realH === realA && h === a) {
        pts += 1;
        msgText = `${matchName} (${realH}:${realA}) - Bərabərlik düz tapıldı! 1 xal qazandınız.`;
    } else if ((realH > realA && h > a) || (realA > realH && a > h)) {
        pts += 1;
        msgText = `${matchName} (${realH}:${realA}) - Qalibi düzgün tapdınız! 1 xal qazandınız.`;
    } else {
        msgText = `${matchName} (${realH}:${realA}) - Proqnozunuz (${h}:${a}) düzgün çıxmadı.`;
    }

    localStorage.setItem('pts_' + currentUser, pts);
    localStorage.setItem('msg_' + currentUser + '_' + i, JSON.stringify({ text: msgText, time: Date.now() }));
    updatePointsTable();
}
// Kodunun sonuna bu funksiyanı əlavə et

function updateUI() {
    const container = document.getElementById('livescore-container'); // Saytındakı siyahı üçün olan div-in ID-sini bura yaz
    container.innerHTML = ''; // Əvvəlki məlumatları təmizlə

    window.matchesData.forEach(match => {
        const matchDiv = document.createElement('div');
        matchDiv.className = 'match-card';
        matchDiv.innerHTML = `
            <p>${match.homeTeam.name} vs ${match.awayTeam.name}</p>
            <p>Status: ${match.status}</p>
        `;
        container.appendChild(matchDiv);
    });
}

function checkAndRefreshStatus() {
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            let matchIndex = key.split('_')[2]; 
            let data = JSON.parse(localStorage.getItem(key));

            if (data.text.includes("gözlənilir")) {
                let match = matchesData.find((m, index) => index == matchIndex);
                if (match && match.status === 'FINISHED') {
                    console.log("Oyun bitdi, nəticə yenilənir...");
                    localStorage.removeItem(key);
                    calculateAndNotify(match, matchIndex);
                    updateNotifications(); // Ekranı yenilə
                }
            }
        }
    }
}

</script>

    window.addEventListener('load', startApp);
