    function saveScore(matchId) {
        const m = window.matchesData.find(match => match.id == matchId);
        if (!m) { alert("Mat√ß tapńĪlmadńĪ."); return; }

        const hInput = document.getElementById(`h-${matchId}`);
        const aInput = document.getElementById(`a-${matchId}`);
        const h = parseInt(hInput.value);
        const a = parseInt(aInput.value);
        
        if (!isNaN(h) && !isNaN(a)) {
            let pts = parseInt(localStorage.getItem('pts_' + currentUser) || 0);
            let msgText = "";
            const matchName = `${m.homeTeam.name} - ${m.awayTeam.name}`;
            const status = m.status ? m.status.toUpperCase() : '';

            if (status === 'FINISHED') {
                const realH = m.score.fullTime.home;
                const realA = m.score.fullTime.away;
                
                if (h === realH && a === realA) { pts += 4; msgText = `${matchName} (${realH}:${realA}) - D…ôqiq hesab! 4 xal.`; } 
                else if ((realH !== realA) && (h !== a) && ((h - a) === (realH - realA))) { pts += 2; msgText = `${matchName} (${realH}:${realA}) - Qol f…ôrqi d√ľzd√ľr! 2 xal.`; } 
                else if (realH === realA && h === a) { pts += 1; msgText = `${matchName} (${realH}:${realA}) - B…ôrab…ôrlik d√ľzd√ľr! 1 xal.`; } 
                else if ((realH > realA && h > a) || (realA > realH && a > h)) { pts += 1; msgText = `${matchName} (${realH}:${realA}) - Qalib d√ľzd√ľr! 1 xal.`; } 
                else { msgText = `${matchName} (${realH}:${realA}) - Proqnozunuz (${h}:${a}) d√ľz √ßńĪxmadńĪ.`; }
                localStorage.setItem('pts_' + currentUser, pts);
            } else {
                msgText = `${matchName}: Proqnozunuz (${h}:${a}) qeyd…ô alńĪndńĪ, oyunun bitm…ôsi g√∂zl…ônilir.`;
            }

            localStorage.setItem('s-' + currentUser + '-' + matchId, `${h} - ${a}`);
            localStorage.setItem('msg_' + currentUser + '_' + matchId, JSON.stringify({ text: msgText, time: Date.now() }));
            
            fetchMatches(); 
        } else {
            alert("Z…ôhm…ôt olmasa xanalarńĪ doldurun!");
        }
    }

    function updateNotifications() {
    let container = document.getElementById('notification-container');
    if (!container) return;
    
    let messages = [];
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            try { 
                messages.push(JSON.parse(localStorage.getItem(key))); 
            } catch (e) {}
        }
    }
    
    // ∆Źn son bildiriŇü yuxarńĪda olsun
    messages.sort((a, b) => b.time - a.time);
    
    container.innerHTML = messages.map(msgData => {
        let dateStr = new Date(msgData.time).toLocaleString('az-AZ');
        let text = msgData.text;
        
        // Default (ilkin) olaraq mavi r…ông t…ôyin edirik
        let colorClass = "msg-loading"; 
        
        // Ňě…ôrtl…ôri d…ôqiq m…ôtnd…ôki a√ßar s√∂zl…ôr…ô g√∂r…ô yoxlayńĪrńĪq
        if (text.includes("4 xal")) {
            colorClass = "msg-4"; // YaŇüńĪl
        } else if (text.includes("2 xal")) {
            colorClass = "msg-2"; // SarńĪ
        } else if (text.includes("1 xal")) {
            colorClass = "msg-1"; // NarńĪncńĪ
        } else if (text.includes("√ßńĪxmadńĪ") || text.includes("s…ôhv")) {
            colorClass = "msg-0"; // QńĪrmńĪzńĪ
        } else if (text.includes("g√∂zl…ônilir")) {
            colorClass = "msg-loading"; // Mavi
        }
        
        return `<div class="match-card ${colorClass}"><small style="color:#777">${dateStr}</small><br>${text}</div>`;
    }).join('') || "<p style='color:gray; padding:10px;'>H…ôl…ôlik bildiriŇü yoxdur.</p>";
}

    function updatePointsTable() {
        let users = [];
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.startsWith('pts_')) users.push({ name: key.replace('pts_', ''), pts: parseInt(localStorage.getItem(key)) });
        }
        users.sort((a, b) => b.pts - a.pts);
        document.getElementById('table-body').innerHTML = users.map((u, i) => `<tr><td>${i+1}</td><td>${u.name}</td><td>${u.pts}</td></tr>`).join('');
    }

    function checkAndRefreshStatus() {
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            let matchId = key.split('_')[2]; 
            let data = JSON.parse(localStorage.getItem(key));

            if (data.text.includes("g√∂zl…ônilir")) {
                let match = window.matchesData.find(m => m.id == matchId);
                // m.status yox, match.status olmalńĪdńĪr
                if (match && match.status && match.status.toUpperCase() === 'FINISHED') {
                    localStorage.removeItem(key);
                    calculateAndNotify(match, matchId);
                }
            }
        }
    }
}

    function calculateAndNotify(m, matchId) {
        const saved = localStorage.getItem('s-' + currentUser + '-' + matchId);

        const [h, a] = saved.split(' - ').map(Number);
        const realH = m.score.fullTime.home;
        const realA = m.score.fullTime.away;
        let pts = parseInt(localStorage.getItem('pts_' + currentUser) || 0);
        let msgText = "";
        const matchName = `${m.homeTeam.name} - ${m.awayTeam.name}`;

        if (h === realH && a === realA) { pts += 4; msgText = `${matchName} (${realH}:${realA}) - D…ôqiq hesab! 4 xal.`; }
        else { msgText = `${matchName} (${realH}:${realA}) - Proqnozunuz d√ľzg√ľn √ßńĪxmadńĪ.`; }

        localStorage.setItem('pts_' + currentUser, pts);
        localStorage.setItem('msg_' + currentUser + '_' + matchId, JSON.stringify({ text: msgText, time: Date.now() }));
        updatePointsTable();
        updateNotifications();
    }
