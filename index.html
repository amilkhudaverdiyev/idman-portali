<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <title>ńįdman PortalńĪ</title>
    <script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

    <style>
        :root { --primary: #2c3e50; --accent: #3498db; --bg: #f4f7f6; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        #login-panel { max-width: 350px; margin: 80px auto; padding: 30px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        .login-input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .main-menu { display: flex; gap: 10px; margin-bottom: 20px; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .main-btn { padding: 10px 15px; background: transparent; border: none; cursor: pointer; border-radius: 5px; font-weight: 600; transition: 0.3s; }
        .main-btn.active { background: var(--primary); color: white; }
        .tab-content { display: none; animation: fadeIn 0.5s; }
        .tab-content.active { display: block; }
        .sub-sections { display: flex; gap: 10px; margin-bottom: 20px; }
        .sub-btn { flex: 1; padding: 8px; background: white; border: 1px solid #ddd; text-align: center; cursor: pointer; border-radius: 6px; }
        .sub-btn.active { background: var(--accent); color: white; border-color: var(--accent); }
        .panel { display: none; }
        .panel.active { display: block; }
        .match-card { background: white; padding: 18px; margin-bottom: 12px; border-radius: 8px; border-left: 4px solid var(--accent); box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        input { padding: 8px; width: 60px; border: 1px solid #ccc; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
        th, td { padding: 15px; border-bottom: 1px solid #eee; text-align: left; }
        th { background: #f8f9fa; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
   /* R…ông sxemi */
.msg-4 { border-left: 5px solid #27ae60 !important; background: #e8f8f0 !important; } /* 4 xal - YaŇüńĪl */
.msg-2 { border-left: 5px solid #f1c40f !important; background: #fef9e7 !important; } /* 2 xal - SarńĪ */
.msg-1 { border-left: 5px solid #e67e22 !important; background: #fdedec !important; } /* 1 xal - NarńĪncńĪ */
.msg-0 { border-left: 5px solid #e74c3c !important; background: #fdedec !important; } /* 0 xal - QńĪrmńĪzńĪ */
.msg-loading { border-left: 5px solid #3498db !important; background: #ebf5fb !important; } /* G√∂zl…ônilir - Mavi */

    </style>
</head>
    <script>
    console.log("Script iŇü…ô d√ľŇüd√ľ!");
window.fetchMatches = async function() {
    console.log("Sorńüu g√∂nd…ôrilir...");
    
    // API KonfiqurasiyasńĪ
    const API_KEY = '100dddf0da034503890c0624dc38776d';
    const targetUrl = 'https://api.football-data.org/v4/competitions/WC/matches';
    // corsproxy.io sorńüunun arasńĪna gir…ôr…ôk brauzer…ô lazńĪm olan icaz…ô baŇülńĪqlarńĪnńĪ (headers) …ôlav…ô edir
    const proxyUrl = 'https://corsproxy.io/?' + encodeURIComponent(targetUrl);

    try {
        const response = await fetch(proxyUrl, {
            method: 'GET',
            headers: { 
                'X-Auth-Token': API_KEY,
                'Content-Type': 'application/json'
            }
        });

        if (!response.ok) {
            throw new Error(`API cavab verm…ôdi: ${response.status}`);
        }

        const data = await response.json();
        
        // M…ôlumatńĪ global d…ôyiŇü…ôn…ô yazńĪrńĪq ki, dig…ôr funksiyalar da istifad…ô ed…ô bilsin
        window.matchesData = data.matches;

        console.log("M…ôlumat uńüurla alńĪndńĪ!", window.matchesData);
        
        // Burada s…ôhif…ôni yenil…ôy…ôn v…ô ya panell…ôri g√∂st…ôr…ôn funksiyanńĪ √ßańüńĪr
        // M…ôs…ôl…ôn: renderAllPanels(); 

    } catch (error) {
        console.error("X…ôta baŇü verdi:", error);
        alert("M…ôlumatńĪ y√ľkl…ôm…ôk m√ľmk√ľn olmadńĪ. Konsola (F12) bax.");
    }
};


</script>

<body>

<div id="login-panel">
    <div id="login-form">
        <h3 style="text-align:center">Sistem…ô GiriŇü</h3>
        <input type="text" id="username" class="login-input" placeholder="ńįstifad…ô√ßi adńĪ">
        <input type="password" id="password" class="login-input" placeholder="Parol">
        <button onclick="initialLogin()" class="main-btn active" style="width:100%">Daxil ol</button>
    </div>
    <div id="reset-form" style="display:none;">
        <h3>Parolu yenil…ô</h3>
        <input type="password" id="new-password" class="login-input" placeholder="Yeni parol">
        <button onclick="updatePassword()" class="main-btn active" style="background:#27ae60; width:100%">Yadda saxla</button>
    </div>
</div>

<div id="main-system" style="display:none;">
    <div class="main-menu">
        <button class="main-btn active" onclick="showMain('tab1', this)">Livescore</button>
        <button class="main-btn" onclick="showMain('tab2', this)">Proqnozlar</button>
        <button class="main-btn" onclick="showMain('tab3', this)">C…ôdv…ôl</button>
        <button class="main-btn" onclick="showMain('tab4', this)">BildiriŇül…ôr</button>
        <button onclick="hardReset()" style="background:#c0392b; color:white; padding:10px; border:none; border-radius:5px; cursor:pointer;">
    Sistemi Tam SńĪfńĪrla
</button>

    </div>

    <div id="tab1" class="tab-content active">
        <div class="sub-sections">
            <div class="sub-btn active" onclick="showSub('live-panel', this)">CanlńĪ</div>
            <div class="sub-btn" onclick="showSub('finished-panel', this)">BitmiŇü</div>
            <div class="sub-btn" onclick="showSub('schedule-panel', this)">Tarixl…ôr</div>
        </div>
        <div id="live-panel" class="panel active"><h3>ūüĒī CanlńĪ</h3><div id="live-container"></div></div>
        <div id="finished-panel" class="panel"><h3>‚úÖ BitmiŇü</h3><div id="finished-container"></div></div>
        <div id="schedule-panel" class="panel"><h3>ūüďÖ Proqram</h3><div id="schedule-container"></div></div>
    </div>

    <div id="tab2" class="tab-content">
        <h3>Proqnozlar</h3>
        <div id="tab2-container">Y√ľkl…ônir...</div>
    </div>

    <div id="tab3" class="tab-content">
        <h3>Turnir C…ôdv…ôli</h3>
        <table>
            <thead><tr><th>Yer</th><th>ńįstifad…ô√ßi</th><th>Xal</th></tr></thead>
            <tbody id="table-body"></tbody>
        </table>
    </div>

    <div id="tab4" class="tab-content">
        <h3>BildiriŇül…ôriniz</h3>
        <div id="notification-container"></div>
    </div>
</div>

<script>
    let currentUser = "";
    let matchesData = [];

    // ... (Login funksiyalarńĪ eyni qalńĪr) ...
    function initialLogin() {
        const user = document.getElementById('username').value;
        const pass = document.getElementById('password').value;
        if (pass === "1234") { currentUser = user; document.getElementById('login-form').style.display = 'none'; document.getElementById('reset-form').style.display = 'block'; }
        else { alert("YanlńĪŇü parol! ńįlkin parol 1234-d√ľr."); }
    }

    function updatePassword() {
        const newPass = document.getElementById('new-password').value;
        if (newPass.length >= 4) {
            localStorage.setItem('pass_' + currentUser, newPass);
            document.getElementById('login-panel').style.display = 'none';
            document.getElementById('main-system').style.display = 'block';
            fetchMatches();
        } else { alert("Parol …ôn az 4 simvol olmalńĪdńĪr!"); }
    }

    
    // ... (saveScore, updateNotifications, updatePointsTable funksiyalarńĪ d…ôyiŇüm…ôz qalńĪr) ...
    function saveScore(i) {
    const m = matchesData[i];
    const hInput = document.getElementById(`h-${i}`);
    const aInput = document.getElementById(`a-${i}`);
    const btn = document.querySelector(`button[onclick="saveScore(${i})"]`);
    
    const h = parseInt(hInput.value);
    const a = parseInt(aInput.value);
    
    if (!isNaN(h) && !isNaN(a)) {
        let pts = parseInt(localStorage.getItem('pts_' + currentUser) || 0);
        let msgText = "";
        const matchName = `${m.homeTeam.name} - ${m.awayTeam.name}`;

        if (m.status === 'FINISHED') {
            const realH = m.score.fullTime.home;
            const realA = m.score.fullTime.away;
            
            if (h === realH && a === realA) {
                pts += 4;
                msgText = `${matchName} (${realH}:${realA}) - D…ôqiq hesab! 4 xal qazandńĪnńĪz.`;
            } else if ((realH !== realA) && (h !== a) && ((h - a) === (realH - realA))) {
                pts += 2;
                msgText = `${matchName} (${realH}:${realA}) - Qol f…ôrqi d√ľzd√ľr! 2 xal qazandńĪnńĪz.`;
            } else if (realH === realA && h === a) {
                pts += 1;
                msgText = `${matchName} (${realH}:${realA}) - B…ôrab…ôrlik d√ľz tapńĪldńĪ! 1 xal qazandńĪnńĪz.`;
            } else if ((realH > realA && h > a) || (realA > realH && a > h)) {
                pts += 1;
                msgText = `${matchName} (${realH}:${realA}) - Qalibi d√ľzg√ľn tapdńĪnńĪz! 1 xal qazandńĪnńĪz.`;
            } else {
                msgText = `${matchName} (${realH}:${realA}) - Proqnozunuz (${h}:${a}) d√ľzg√ľn √ßńĪxmadńĪ.`;
            }
            localStorage.setItem('pts_' + currentUser, pts);
        } else {
            msgText = `${matchName}: Proqnozunuz (${h}:${a}) qeyd…ô alńĪndńĪ, oyunun bitm…ôsi g√∂zl…ônilir.`;
        }

        // BildiriŇüi obyekt kimi saxlayńĪrńĪq (JSON)
        const notification = { text: msgText, time: Date.now() };
        localStorage.setItem('s-' + currentUser + '-' + i, `${h} - ${a}`);
        localStorage.setItem('msg_' + currentUser + '_' + i, JSON.stringify(notification));
        
        hInput.disabled = true; aInput.disabled = true;
        btn.disabled = true; btn.innerText = "Yadda saxlanńĪldńĪ";
        btn.style.backgroundColor = "#bdc3c7";

        updatePointsTable(); 
        updateNotifications();
    } else {
        alert("Z…ôhm…ôt olmasa xanalarńĪ doldurun!");
    }
}

function updateNotifications() {
    let container = document.getElementById('notification-container');
    if (!container) return;
    
    let messages = [];
    
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            try {
                let data = JSON.parse(localStorage.getItem(key));
                messages.push(data);
            } catch (e) {
                // K√∂hn…ô m…ôlumatlarńĪ t…ômizl…ôm…ôk v…ô ya emal etm…ôk √ľ√ß√ľn
                console.log("K√∂hn…ô formatlńĪ m…ôlumat aŇükar edildi.");
            }
        }
    }

    // ∆Źn son bildiriŇüi …ôn baŇüa √ß…ôkirik
    messages.sort((a, b) => b.time - a.time);
    
    let html = messages.map(msgData => {
        let dateStr = new Date(msgData.time).toLocaleString('az-AZ');
        let text = msgData.text;
        
        let colorClass = "msg-loading";
        if (text.includes("4 xal")) colorClass = "msg-4";
        else if (text.includes("2 xal")) colorClass = "msg-2";
        else if (text.includes("1 xal")) colorClass = "msg-1";
        else if (text.includes("d√ľzg√ľn √ßńĪxmadńĪ")) colorClass = "msg-0";
        
        return `<div class="match-card ${colorClass}">
                    <div style="font-size: 11px; color: #777; margin-bottom: 5px;">${dateStr}</div>
                    ${text}
                </div>`;
    }).join('');

    container.innerHTML = html || "<p>H…ôl…ôlik bildiriŇü yoxdur.</p>";
}


    
    function updatePointsTable() {
        let users = [];
        for (let i = 0; i < localStorage.length; i++) {
            let key = localStorage.key(i);
            if (key.startsWith('pts_')) users.push({ name: key.replace('pts_', ''), pts: parseInt(localStorage.getItem(key)) });
        }
        users.sort((a, b) => b.pts - a.pts);
        document.getElementById('table-body').innerHTML = users.map((u, i) => `<tr><td>${i+1}</td><td>${u.name}</td><td>${u.pts}</td></tr>`).join('');
    }

    function showMain(id, btn) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.main-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function showSub(id, btn) {
        document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        btn.classList.add('active');
    }
    function hardReset() {
    // 1. B√ľt√ľn m…ôlumatlarńĪ t…ômizl…ôyir
    localStorage.clear();
    
    // 2. ńįstifad…ô√ßiy…ô m…ôlumat verir
    alert("Sistem tamamil…ô t…ômizl…ôndi! S…ôhif…ô yenil…ônir.");
    
    // 3. S…ôhif…ôni k…ôŇüf yaddaŇüńĪnńĪ t…ômizl…ôy…ôr…ôk yenid…ôn y√ľkl…ôyir
    window.location.reload(true);
}
    function calculateAndNotify(m, i) {
    const saved = localStorage.getItem('s-' + currentUser + '-' + i);
    if (!saved) return;

    const [h, a] = saved.split(' - ').map(Number);
    const realH = m.score.fullTime.home;
    const realA = m.score.fullTime.away;
    
    let pts = parseInt(localStorage.getItem('pts_' + currentUser) || 0);
    let msgText = "";
    const matchName = `${m.homeTeam.name} - ${m.awayTeam.name}`;

    // Xal hesablama m…ôntiqi (saveScore il…ô eyni)
    if (h === realH && a === realA) {
        pts += 4;
        msgText = `${matchName} (${realH}:${realA}) - D…ôqiq hesab! 4 xal qazandńĪnńĪz.`;
    } else if ((realH !== realA) && (h !== a) && ((h - a) === (realH - realA))) {
        pts += 2;
        msgText = `${matchName} (${realH}:${realA}) - Qol f…ôrqi d√ľzd√ľr! 2 xal qazandńĪnńĪz.`;
    } else if (realH === realA && h === a) {
        pts += 1;
        msgText = `${matchName} (${realH}:${realA}) - B…ôrab…ôrlik d√ľz tapńĪldńĪ! 1 xal qazandńĪnńĪz.`;
    } else if ((realH > realA && h > a) || (realA > realH && a > h)) {
        pts += 1;
        msgText = `${matchName} (${realH}:${realA}) - Qalibi d√ľzg√ľn tapdńĪnńĪz! 1 xal qazandńĪnńĪz.`;
    } else {
        msgText = `${matchName} (${realH}:${realA}) - Proqnozunuz (${h}:${a}) d√ľzg√ľn √ßńĪxmadńĪ.`;
    }

    localStorage.setItem('pts_' + currentUser, pts);
    localStorage.setItem('msg_' + currentUser + '_' + i, JSON.stringify({ text: msgText, time: Date.now() }));
    updatePointsTable();
}
// Kodunun sonuna bu funksiyanńĪ …ôlav…ô et

function updateUI() {
    const container = document.getElementById('livescore-container'); // SaytńĪndakńĪ siyahńĪ √ľ√ß√ľn olan div-in ID-sini bura yaz
    container.innerHTML = ''; // ∆Źvv…ôlki m…ôlumatlarńĪ t…ômizl…ô

    window.matchesData.forEach(match => {
        const matchDiv = document.createElement('div');
        matchDiv.className = 'match-card';
        matchDiv.innerHTML = `
            <p>${match.homeTeam.name} vs ${match.awayTeam.name}</p>
            <p>Status: ${match.status}</p>
        `;
        container.appendChild(matchDiv);
    });
}

function checkAndRefreshStatus() {
    for (let i = 0; i < localStorage.length; i++) {
        let key = localStorage.key(i);
        if (key.startsWith('msg_' + currentUser + '_')) {
            let matchIndex = key.split('_')[2]; 
            let data = JSON.parse(localStorage.getItem(key));

            if (data.text.includes("g√∂zl…ônilir")) {
                let match = matchesData.find((m, index) => index == matchIndex);
                if (match && match.status === 'FINISHED') {
                    console.log("Oyun bitdi, n…ôtic…ô yenil…ônir...");
                    localStorage.removeItem(key);
                    calculateAndNotify(match, matchIndex);
                    updateNotifications(); // EkranńĪ yenil…ô
                }
            }
        }
    }
}

</script>
    <script>
    // ∆Źg…ôr bu funksiya burada yoxdursa, kod iŇül…ôm…ôy…ôc…ôk
    function startApp() {
        console.log("Sistem iŇü…ô d√ľŇü√ľr...");
        fetchMatches();
    }

    // S…ôhif…ô tam y√ľkl…ôn…ônd…ô sistemi baŇülat
    window.addEventListener('load', startApp);
</script>

</body>
